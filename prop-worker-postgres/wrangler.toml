name = "headlo-prop-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# ── Secrets ───────────────────────────────────────────────────────────────────
# Set via: wrangler secret put HEADLO_PUBLISHABLE_KEY
#
# Get your publishable key from the Headlo dashboard → Settings → API Keys.
# It looks like: pk_live_xxxxxxxxxxxx
#
# Optional — only needed to point at a non-production Headlo environment:
#   wrangler secret put HEADLO_ORIGIN   # e.g. https://api-dev.headlo.com
# ─────────────────────────────────────────────────────────────────────────────
